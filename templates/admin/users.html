{% extends "base.html" %}
{% block title %}User Management - SA Verify{% endblock %}
{% block content %}
<div class="dashboard">
    <a href="/admin/dashboard" class="back-link">Back to Dashboard</a>
    <h1>User Management</h1>

    <section class="section">
        <h2>Create User</h2>
        <form id="userForm" onsubmit="createUser(event)">
            <div class="form-row">
                <div class="form-group"><label>Username</label><input type="text" id="newUsername" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="newPassword" required minlength="6"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Full Name</label><input type="text" id="newFullName" required></div>
                <div class="form-group"><label>Role</label>
                    <select id="newRole" required>
                        <option value="candidate">Candidate</option>
                        <option value="employer">Employer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Citizen ID (for candidates)</label><input type="number" id="newCitizenId" placeholder="Optional"></div>
                <div class="form-group"><label>Company ID (for employers)</label><input type="number" id="newCompanyId" placeholder="Optional"></div>
            </div>
            <button type="submit" class="btn btn-primary">Create User</button>
        </form>
    </section>

    <section class="section">
        <h2>All Users</h2>
        <div id="usersList"><p class="loading">Loading...</p></div>
    </section>
</div>
{% endblock %}
{% block scripts %}
<script>
requireAuth('admin');

async function loadUsers() {
    const c = document.getElementById('usersList');
    try {
        const users = await apiGet('/api/admin/users');
        c.innerHTML = `<table class="data-table"><thead><tr><th>ID</th><th>Username</th><th>Name</th><th>Role</th><th>Active</th><th>Actions</th></tr></thead><tbody>
            ${users.map(u => `<tr>
                <td>${u.id}</td><td>${u.username}</td><td>${u.full_name}</td>
                <td>${u.role}</td><td>${u.is_active ? 'Yes' : 'No'}</td>
                <td>${u.is_active ? `<button class="btn btn-danger btn-xs" onclick="toggleUser(${u.id}, false)">Disable</button>` : `<button class="btn btn-success btn-xs" onclick="toggleUser(${u.id}, true)">Enable</button>`}</td>
            </tr>`).join('')}
        </tbody></table>`;
    } catch { c.innerHTML = '<p class="error">Failed to load.</p>'; }
}

async function createUser(e) {
    e.preventDefault();
    try {
        await apiPost('/api/admin/users', {
            username: document.getElementById('newUsername').value,
            password: document.getElementById('newPassword').value,
            full_name: document.getElementById('newFullName').value,
            role: document.getElementById('newRole').value,
            citizen_id: parseInt(document.getElementById('newCitizenId').value) || null,
            company_id: parseInt(document.getElementById('newCompanyId').value) || null,
        });
        showAlert('User created.', 'success');
        document.getElementById('userForm').reset();
        loadUsers();
    } catch (err) { showAlert(err.message || 'Failed.', 'error'); }
}

async function toggleUser(id, active) {
    try {
        const resp = await fetch(`/api/admin/users/${id}`, {
            method: 'PUT', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}`},
            body: JSON.stringify({is_active: active})
        });
        if (!resp.ok) throw new Error();
        loadUsers();
    } catch { showAlert('Failed to update user.', 'error'); }
}

loadUsers();
</script>
{% endblock %}
